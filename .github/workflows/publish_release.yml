name: Publish Release

on:
  push:
    branches: [ main ]
    paths:
      - config/releases.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4

      - name: Read latest release entry
        id: release
        run: |
          ruby <<'RUBY'
          require "yaml"

          payload = YAML.safe_load(File.read("config/releases.yml"), permitted_classes: [], aliases: false) || {}
          release = Array(payload["releases"]).first

          abort("config/releases.yml does not contain any releases") unless release

          version = release.fetch("version").to_s
          title = release.fetch("title").to_s
          summary = release.fetch("summary").to_s
          released_on = release.fetch("released_on").to_s
          changes = Array(release.fetch("changes")).map(&:to_s)

          body = +"#{summary}\n\n"
          body << "Released on: #{released_on}\n\n"
          body << "## Changes\n"
          changes.each do |change|
            body << "- #{change}\n"
          end

          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |file|
            file.puts("version=#{version}")
            file.puts("tag=v#{version}")
            file.puts("title=#{title}")
            file.puts("released_on=#{released_on}")
            file.puts("body<<EOF")
            file.puts(body)
            file.puts("EOF")
          end
          RUBY

      - name: Check whether the GitHub release already exists
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Git tag if needed
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.existing_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "${{ steps.release.outputs.tag }}: ${{ steps.release.outputs.title }}" \
            --notes "${{ steps.release.outputs.body }}"

      - name: Prepare Docker image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${repository}"
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          short_sha="${GITHUB_SHA::12}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          tags="${ghcr_image}:${tag}"
          tags="${tags}"$'\n'"${ghcr_image}:${version}"
          tags="${tags}"$'\n'"${ghcr_image}:latest"
          tags="${tags}"$'\n'"${ghcr_image}:sha-${short_sha}"

          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            dockerhub_namespace="$(echo "${DOCKERHUB_USERNAME}" | tr '[:upper:]' '[:lower:]')"
            dockerhub_repository="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]_' '[:lower:]-')"
            dockerhub_image="docker.io/${dockerhub_namespace}/${dockerhub_repository}"

            tags="${tags}"$'\n'"${dockerhub_image}:${tag}"
            tags="${tags}"$'\n'"${dockerhub_image}:${version}"
            tags="${tags}"$'\n'"${dockerhub_image}:latest"
            tags="${tags}"$'\n'"${dockerhub_image}:sha-${short_sha}"
          fi

          {
            echo "ghcr_image=${ghcr_image}"
            echo "created=${created}"
            echo "tags<<EOF"
            printf "%s\n" "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Expense Tracker
            org.opencontainers.image.description=Self-hosted monthly budgeting app built with Rails
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.image.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
