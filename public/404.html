<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>404 · That page is not in the ledger · Expense Tracker</title>
  <style>
    :root {
      color-scheme: light dark;
      --canvas: #f4efe5;
      --paper: #fffdf7;
      --ink: #28241f;
      --muted: #6f675d;
      --rule: #cfc4b4;
      --accent: #345b4a;
      --accent-ink: #ffffff;
      --shadow: rgba(62, 52, 39, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        linear-gradient(rgba(76, 67, 54, 0.055) 1px, transparent 1px),
        var(--canvas);
      background-size: 100% 2rem;
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 46rem);
      overflow: hidden;
      border: 1px solid var(--rule);
      border-radius: 1rem;
      background: var(--paper);
      box-shadow: 0 1.25rem 3rem var(--shadow);
    }

    .rail {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--rule);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .body { padding: clamp(1.5rem, 6vw, 3.5rem); }

    .code {
      margin: 0 0 1rem;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 14ch;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.035em;
      line-height: 1;
    }

    p {
      max-width: 38rem;
      margin: 1.25rem 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      min-height: 2.75rem;
      align-items: center;
      margin-top: 1.75rem;
      border-radius: 0.65rem;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 0.75rem 1rem;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover { filter: brightness(1.08); }
    a:focus-visible { outline: 3px solid #e0a545; outline-offset: 3px; }

    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #171a18;
        --paper: #202521;
        --ink: #f4efe5;
        --muted: #b9b1a5;
        --rule: #4a514b;
        --accent: #8fc2a8;
        --accent-ink: #132019;
        --shadow: rgba(0, 0, 0, 0.28);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="rail">
      <span>Expense Tracker</span>
      <span>Request 404</span>
    </div>
    <div class="body">
      <p class="code">Ledger note · 404</p>
      <h1>That page is not in the ledger</h1>
      <p>The address may be out of date, or the page may have moved. Your budgeting data has not been changed.</p>
      <a href="/">Return to Expense Tracker</a>
    </div>
  </main>
</body>
</html>
