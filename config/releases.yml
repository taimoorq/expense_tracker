releases:
  - version: "0.5.3"
    released_on: "2026-04-17"
    title: "Profile hub and live theme polish"
    summary: "This release adds a dedicated profile page, moves profile access into the left navigation, and makes color-scheme changes apply immediately across the app shell."
    changes:
      - "Added a dedicated Profile page that summarizes the signed-in user account, current app preferences, and links to edit profile details or settings."
      - "Moved profile access into the left navigation under Settings and updated the sidebar flyout so profile actions stay visible and usable near the bottom of the screen."
      - "Updated the account-settings back navigation so signed-in users return to their profile instead of being dropped back at the app home."
      - "Made the theme picker apply layout colors, swatches, and browser theme metadata immediately when a new color scheme is selected, while still persisting the choice."
  - version: "0.5.2"
    released_on: "2026-04-13"
    title: "Adding option to import planning templates into a fresh month"
    summary: "dding option to import planning templates into a fresh month"
    changes:
      - "When creating a new fresh month instead of closing there is now an option to import planning templates into that month. This is the default behavior now so it is checked by default"
  - version: "0.5.1"
    released_on: "2026-04-11"
    title: "Smoother month planning navigation"
    summary: "Month planning now uses more natural Turbo-driven navigation, preserves view state more reliably, and adds smoother view transitions across tabs and month views."
    changes:
      - "Converted the month page tabs and Budget subviews to server-driven Turbo navigation so URLs, history, and tab state stay in sync."
      - "Preserved the active Budget subview when editing, deleting, marking entries paid, and opening the guided wizard from grouped, full-list, or calendar mode."
      - "Changed quick-add success flows to return cleanly to Plan and Edit through Turbo redirects instead of blasting the panel in place."
      - "Removed the less useful planned-versus-actual graphs from Breakdown so the visual dashboard stays focused on the more actionable charts."
      - "Added view-transition styling around the month shell, tab bars, and active panels to make month-to-month and tab-to-tab changes feel smoother."
  - version: "0.5.0"
    released_on: "2026-04-11"
    title: "Architecture and workflow refresh"
    summary: "This release reorganizes core budgeting services under clearer domain boundaries and refreshes the main Hotwire workflows across overview, month planning, and modal editing."
    changes:
      - "Restructured recurring, budgeting, accounts, overview, and backup services into clearer domain-oriented layers so recurring generation, matching, and account linking are easier to maintain."
      - "Refreshed the overview page with presenter-backed cards, a year cash flow section, and a full-width Account Activity graph that compares charged versus paid-to totals by account."
      - "Added month-window filtering for Account Activity so you can compare the last month, last 3, 6, or 12 months, or all saved months."
      - "Improved Turbo and Stimulus workflows for the entry wizard, entry editor, and recurring editor with better partial structure, submit pending states, and inline error recovery."
      - "Polished navigation and month workflows with previous and next month controls, clearer sidebar icons, and more guided month setup and review flows."
  - version: "0.4.4"
    released_on: "2026-03-31"
    title: "Seed login documentation update"
    summary: "The README now explains that all seeded test users share the same seed password for a given run and lists the all_test_users email addresses."
    changes:
      - "Documented that SEED_USER_PASSWORD applies to every seeded non-admin user created in the same run."
      - "Added the exact all_test_users email list to the seed documentation."
  - version: "0.4.3"
    released_on: "2026-03-31"
    title: "Expanded developer seed profiles"
    summary: "The app now supports multiple seed profiles for local testing, including recurring-heavy, month-history, account-heavy, and manual-adjustment scenarios."
    changes:
      - "Added named seed profiles for different testing states instead of relying on one demo user."
      - "Added an all_test_users profile to create a full local QA set in one seed run."
      - "Updated seed documentation and sample scenarios for recurring-linked manual entries."
  - version: "0.4.2"
    released_on: "2026-03-31"
    title: "Recurring transactions terminology refresh"
    summary: "The app now uses Recurring Transactions consistently across the product, documentation, and marketing site."
    changes:
      - "Renamed user-facing planning template copy to Recurring Transactions, with Recurring used where space is tight."
      - "Updated navigation, overview actions, help content, and public documentation to match the new terminology."
      - "Refreshed the recurring section icon to use a repeat-style symbol."
  - version: "0.4.1"
    released_on: "2026-03-28"
    title: "GitHub release notes integration"
    summary: "The app now automatically creates a release in the GitHub repo for each new version, making it easier to track changes and updates."
    changes:
      - "Automatically creates a release in the GitHub repo for each new version."
  - version: "0.4.0"
    released_on: "2026-03-28"
    title: "In-app release notes"
    summary: "The app now highlights new updates so self-hosted users can see what changed after each deploy."
    changes:
      - "Added a repo-backed release log that ships with the app."
      - "Shows a global update banner until each signed-in user marks the latest release as seen."
      - "Displays unread release badges in navigation and a release history section in Help."
  - version: "0.3.0"
    released_on: "2026-03-23"
    title: "Billing schedule updates"
    summary: "Monthly bills can now carry richer scheduling details so recurring planning is easier to maintain."
    changes:
      - "Expanded monthly bill scheduling support."
      - "Improved linked-account planning behavior for recurring templates."
      - "Refined month setup flow to make recurring data easier to review."
