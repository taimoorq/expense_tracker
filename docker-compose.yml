services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_tracker_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_tracker_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/expense_tracker_development
      RAILS_ENV: development
      PORT: 3000
      RUBY_DEBUG_OPEN: "true"
      RUBY_DEBUG_LAZY: "true"
      SEED_MODE: ${SEED_MODE:-users}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-demo@example.com}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-password123!}
      ADMIN_USER_EMAIL: ${ADMIN_USER_EMAIL:-}
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD:-}
    ports:
      - "${APP_PORT:-4287}:3000"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    stdin_open: true
    tty: true
    command: bin/dev

volumes:
  postgres_data:
  bundle_data:
